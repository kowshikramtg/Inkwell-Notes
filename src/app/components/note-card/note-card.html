<article class="note-card" (click)="open()" [class.pinned]="note.isPinned">
  <div class="card-header">
    <h3 class="note-title">{{ note.title || 'Untitled' }}</h3>
    <div class="card-actions">
      <button
        class="action-btn pin-btn"
        [class.active]="note.isPinned"
        (click)="togglePin($event)"
        [title]="note.isPinned ? 'Unpin' : 'Pin'"
      >
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M10 2l1.8 5.5H18l-4.9 3.6 1.9 5.8L10 13.4l-5 3.5 1.9-5.8L2 7.5h6.2L10 2z"
            [attr.fill]="note.isPinned ? 'currentColor' : 'none'"
            stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn delete-btn" (click)="delete($event)" title="Delete">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <p class="note-preview" *ngIf="preview">{{ preview }}</p>
  <p class="note-empty" *ngIf="!preview">No content yet…</p>

  <div class="card-footer">
    <div class="tags-row" *ngIf="note.tags.length > 0">
      <span class="tag" *ngFor="let tag of note.tags" [attr.data-tag]="tag">{{ tag }}</span>
    </div>
    <span class="time-ago">{{ timeAgo }}</span>
  </div>
</article>
